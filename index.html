<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cover Page Generator | Premier University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Times New Roman', serif;
            background: linear-gradient(145deg, #eef2f8 0%, #dce5ef 100%);
            padding: 2rem;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; }

        .app-header {
            background: white;
            border-radius: 32px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .logo-img {
            max-height: 60px;
            width: auto;
        }
        .title-area h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f2b3d;
            margin: 0;
        }
        .title-area p {
            font-size: 0.8rem;
            color: #2c5282;
            margin: 0;
        }
        .badge {
            background: #eef2ff;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e3a5f;
        }

        .form-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
        }
        .form-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #1e3a5f;
            border-left: 5px solid #1e3a5f;
            padding-left: 1rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #2c3e50;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            padding: 0.6rem 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1e3a5f;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }
        .students-header {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 1.5rem 0 1rem;
            color: #1e3a5f;
            border-left: 5px solid #1e3a5f;
            padding-left: 1rem;
        }
        .student-row {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            align-items: center;
            background: #fafcff;
            padding: 0.5rem;
            border-radius: 20px;
            border: 1px solid #eef2ff;
        }
        .student-row input {
            flex: 1;
            padding: 0.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
        }
        .add-btn, .generate-btn {
            background: linear-gradient(135deg, #1e3a5f 0%, #2a4a6e 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .add-btn:hover, .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }
        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .generate-btn {
            width: 100%;
            margin-top: 1.8rem;
            font-size: 1rem;
            padding: 0.8rem;
        }
        
        /* Mobile optimisation */
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .app-header { flex-direction: column; text-align: center; padding: 1rem; }
            .logo-area { justify-content: center; flex-wrap: wrap; }
            .title-area h1 { font-size: 1.2rem; }
            .title-area p { font-size: 0.7rem; }
            .badge { font-size: 0.7rem; padding: 0.2rem 1rem; }
            .form-card { padding: 1.2rem; }
            .form-title { font-size: 1.3rem; margin-bottom: 1rem; }
            .form-grid { grid-template-columns: 1fr; gap: 0.8rem; }
            .form-group label { font-size: 0.65rem; }
            .form-group input, .form-group select { padding: 0.5rem; font-size: 0.8rem; }
            .students-header { font-size: 1rem; margin: 1rem 0 0.5rem; }
            .student-row { flex-wrap: wrap; gap: 0.5rem; }
            .student-row input { width: 100%; margin-bottom: 0.3rem; }
            .add-btn, .generate-btn { padding: 0.4rem 1rem; font-size: 0.85rem; }
            .generate-btn { margin-top: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="logo-area">
            <img class="logo-img" src="images/puc_logo.png" alt="Premier University Logo" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2260%22%20height%3D%2260%22%20viewBox%3D%220%200%2080%2080%22%3E%3Crect%20width%3D%2280%22%20height%3D%2280%22%20fill%3D%22%231e3a5f%22%2F%3E%3Ctext%20x%3D%2215%22%20y%3D%2250%22%20fill%3D%22white%22%20font-size%3D%2230%22%3EPUC%3C%2Ftext%3E%3C%2Fsvg%3E';">
            <div class="title-area">
                <h1>Premier University Chittagong</h1>
                <p>Cover Page Generator</p>
            </div>
        </div>
      
    </div>

    <div class="form-card">
        <div class="form-title">Cover Page Details</div>
        <div class="form-grid">
            <div class="form-group"><label>Faculty</label><select id="faculty"><option>Science & Engineering</option><option>Business Studies</option><option>Arts & Humanities</option><option>Law</option></select></div>
            <div class="form-group"><label>Department</label><input id="department" value="Computer Science & Engineering"></div>
            <div class="form-group"><label>Cover Type</label>
                <select id="coverType">
                    <option value="Assignment">Assignment</option>
                    <option value="Project Report">Project Report</option>
                    <option value="Lab Report">Lab Report</option>
                </select>
            </div>
            <!-- Extra field for Lab Report -->
            <div class="form-group" id="reportNoGroup" style="display: none;">
                <label>Report No</label>
                <input id="reportNo" placeholder="e.g., Lab-01">
            </div>
            <div class="form-group"><label>Course Code</label><input id="courseCode" value="CSE 3567"></div>
            <div class="form-group"><label>Course Title</label><input id="courseTitle" value="Computer Networks"></div>
            <div class="form-group"><label id="docNameLabel">Assignment/Report Name</label><input id="docName" value="A Day in the Life of a Web Request"></div>
            <div class="form-group"><label>Submission Date</label><input id="subDate" value="14 May 2026"></div>
            <div class="form-group"><label>Semester</label><select id="semester"><option>1st</option><option>2nd</option><option>3rd</option><option>4th</option><option>5th</option><option>6th</option><option>7th</option><option>8th</option></select></div>
            <div class="form-group"><label>Section</label><input id="section" value="B"></div>
            <div class="form-group"><label>Batch</label><input id="batch" value="43rd"></div>
            <div class="form-group"><label>Session</label><input id="session" value="Fall 2025"></div>
            <div class="form-group"><label>Teacher Name</label><input id="teacherName" value="Teacher Name"></div>
            <div class="form-group"><label>Designation</label><input id="designation" value="Professor"></div>
            <div class="form-group"><label>Teacher's Department</label><input id="teacherDept" value="Department of Computer Science & Engineering"></div>
        </div>

        <div class="students-header">👥 Students (Group Members)</div>
        <div id="studentsContainer">
            <div class="student-row">
                <input type="text" placeholder="Student Name" class="studentName" value="Johayer Anzoom Alavy">
                <input type="text" placeholder="Student ID" class="studentId" value="0222210005101116">
                <button class="remove-btn" style="visibility:hidden;">Remove</button>
            </div>
        </div>
        <button class="add-btn" id="addStudentBtn">+ Add Student</button>
        <button class="generate-btn" id="generateBtn">Generate Cover Page</button>
    </div>
</div>

<script>
    const coverTypeSelect = document.getElementById('coverType');
    const docNameLabel = document.getElementById('docNameLabel');
    const reportNoGroup = document.getElementById('reportNoGroup');
    
    function updateDocNameLabel() {
        const type = coverTypeSelect.value;
        if (type === 'Assignment') docNameLabel.innerText = 'Assignment Name';
        else docNameLabel.innerText = 'Report Name';
    }
    
    function toggleReportNoField() {
        reportNoGroup.style.display = coverTypeSelect.value === 'Lab Report' ? 'flex' : 'none';
    }
    
    coverTypeSelect.addEventListener('change', () => {
        updateDocNameLabel();
        toggleReportNoField();
    });
    
    updateDocNameLabel();
    toggleReportNoField();
    
    const studentsContainer = document.getElementById('studentsContainer');
    document.getElementById('addStudentBtn').addEventListener('click', () => {
        const div = document.createElement('div');
        div.className = 'student-row';
        div.innerHTML = `<input type="text" placeholder="Student Name" class="studentName"><input type="text" placeholder="Student ID" class="studentId"><button class="remove-btn" onclick="this.parentElement.remove(); updateRemoveButtons()">Remove</button>`;
        studentsContainer.appendChild(div);
        updateRemoveButtons();
    });

    function updateRemoveButtons() {
        const rows = document.querySelectorAll('#studentsContainer .student-row');
        rows.forEach(row => {
            const btn = row.querySelector('.remove-btn');
            if (btn) btn.style.visibility = rows.length > 1 ? 'visible' : 'hidden';
        });
    }
    updateRemoveButtons();

    document.getElementById('generateBtn').addEventListener('click', () => {
        const students = [];
        document.querySelectorAll('#studentsContainer .student-row').forEach(row => {
            const name = row.querySelector('.studentName')?.value.trim() || '';
            const id = row.querySelector('.studentId')?.value.trim() || '';
            if (name || id) students.push({ name, id });
        });

        const formData = {
            faculty: document.getElementById('faculty').value,
            department: document.getElementById('department').value,
            coverType: coverTypeSelect.value,
            courseCode: document.getElementById('courseCode').value,
            courseTitle: document.getElementById('courseTitle').value,
            docName: document.getElementById('docName').value,
            submissionDate: document.getElementById('subDate').value,
            semester: document.getElementById('semester').value,
            section: document.getElementById('section').value,
            batch: document.getElementById('batch').value,
            session: document.getElementById('session').value,
            teacherName: document.getElementById('teacherName').value,
            designation: document.getElementById('designation').value,
            teacherDept: document.getElementById('teacherDept').value,
            reportNo: document.getElementById('reportNo').value,
            students: students
        };
        localStorage.setItem('coverPageData', JSON.stringify(formData));
        window.location.href = 'preview.html';
    });
</script>
</body>
</html>
